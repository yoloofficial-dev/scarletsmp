<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universe FFA · Store</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="../style.css">
  <style>
    .store-grid { display: grid; grid-template-columns: 1fr; gap: 2rem; margin: 2rem 0 3rem; max-width: 600px; margin-left: auto; margin-right: auto; }
    .store-item {
      background: rgba(20, 20, 30, 0.7); backdrop-filter: blur(10px);
      border-radius: 30px; padding: 2.5rem 1.5rem; text-align: center;
      border: 1px solid #2a1e30; transition: 0.3s; text-decoration: none; color: inherit; display: block;
    }
    .store-item:hover { transform: translateY(-8px); border-color: #c084fc; box-shadow: 0 12px 30px rgba(124, 58, 237, 0.2); }
    .store-item i { font-size: 3.5rem; color: #c084fc; margin-bottom: 1rem; }
    .store-item h3 { font-size: 1.8rem; margin-bottom: 0.5rem; color: #f0f0f0; }
    .store-item .desc { color: #919db0; margin-bottom: 1rem; }
    .buy-btn {
      background: transparent; border: 2px solid #c084fc; color: #c084fc;
      padding: 0.5rem 2rem; border-radius: 40px; font-weight: 700; cursor: pointer;
      transition: 0.3s; text-decoration: none; display: inline-block;
    }
    .buy-btn:hover { background: #c084fc; color: #0b0d15; }
  </style>
</head>
<body>
  <div class="container">
    <nav class="navbar">
      <a href="../index.html" class="logo"><i class="fas fa-globe"></i><span>Universe FFA</span></a>
      <div class="nav-links">
        <a href="../index.html"><i class="fas fa-home"></i> Home</a>
        <a href="../ffa.html"><i class="fas fa-crosshairs"></i> FFA</a>
        <a href="../pvp.html"><i class="fas fa-sword"></i> PvP</a>
        <a href="index.html" style="color:#c084fc; border-bottom-color:#c084fc;"><i class="fas fa-shopping-cart"></i> Store</a>
        <a href="../leaderboards.html"><i class="fas fa-trophy"></i> Leaderboards</a>
        <a href="../server.html"><i class="fas fa-server"></i> Server</a>
      </div>
      <a href="minecraft://scarletsmp.playwithbao.com:48316" class="btn"><i class="fas fa-play"></i> Join</a>
    </nav>
  </div>
  <div class="container" style="padding: 2rem 0;">
    <h2 class="section-title"><span>🛒 Store</span></h2>
    <p style="color: #b0b8c7; max-width: 600px; margin: 0 auto 2rem; text-align: center;">Support the server and unlock exclusive perks. <strong>All ranks are currently sold out!</strong></p>
    <div class="store-grid">
      <a href="ranks.html" class="store-item">
        <i class="fas fa-crown"></i>
        <h3>Ranks</h3>
        <div class="desc">Unlock custom prefixes, extra homes, and powerful perks.</div>
        <span class="buy-btn">Check Ranks</span>
      </a>
    </div>
  </div>
  <footer>
    <div class="container">
      <div class="footer-content">
        <div class="socials"><a href="https://discord.gg/pzXv2XDpx" target="_blank"><i class="fab fa-discord"></i></a></div>
        <div class="copy">&copy; 2026 <span>Universe FFA</span> · not affiliated with Mojang</div>
      </div>
    </div>
  </footer>
</body>
</html>
